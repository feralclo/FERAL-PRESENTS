<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#a78bfa" fill-opacity="0.35"/>
    </pattern>
    <radialGradient id="bg" cx="50%" cy="35%" r="80%"><stop offset="0%" stop-color="#181626"/><stop offset="100%" stop-color="#08080c"/></radialGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="40%"><stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/><stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/></radialGradient>
    <linearGradient id="floor" x1="0" x2="0" y1="0.5" y2="1"><stop offset="0%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity="0.55"/></linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#dots)"/>
  <rect width="600" height="800" fill="url(#glow)"/>
  <rect width="600" height="800" fill="url(#floor)"/>
</svg>
