<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="stripes" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <rect width="16" height="32" fill="#18181b"/>
      <rect x="16" width="16" height="32" fill="#27272a"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%"><stop offset="0%" stop-color="#a78bfa" stop-opacity="0.2"/><stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/></radialGradient>
    <linearGradient id="floor" x1="0" x2="0" y1="0.5" y2="1"><stop offset="0%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity="0.55"/></linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#stripes)"/>
  <rect width="600" height="800" fill="url(#glow)"/>
  <rect width="600" height="800" fill="url(#floor)"/>
</svg>
